name: rick_and_morty_app
description: Rick and Morty Characters App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3

  # Network
  dio: ^5.4.0

  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utils
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Theming
  flex_color_scheme: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true